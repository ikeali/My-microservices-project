server {
    listen 80;

    location /auth/ {
        proxy_pass http://auth-service/api/auth/;
    }

    location /users/ {
        proxy_pass http://user-service/api/users/;
        proxy_set_header Authorization $http_authorization;
    }

    location /products/ {
        proxy_pass http://product-service/api/products/;
        proxy_set_header Authorization $http_authorization;
    }
}