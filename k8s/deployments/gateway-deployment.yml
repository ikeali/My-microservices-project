apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: 851759420144.dkr.ecr.us-east-2.amazonaws.com/api-gateway:55bd5f78dcc412bf51c6193b2016e3cf5238c6fb
          ports:
            - containerPort: 80