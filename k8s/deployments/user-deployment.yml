apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      tolerations:
        - operator: "Exists"
      containers:
        - name: user-service
          image: 851759420144.dkr.ecr.us-east-2.amazonaws.com/user-service:710d61078810f5581bd61d237c57651c238f4326
          ports:
            - containerPort: 8000
          env:

          - name: USER_SERVICE_URL
            value: http://user-service:80
          - name: JWT_SIGNING_KEY
            valueFrom:
              secretKeyRef:
                name: auth-secret
                key: JWT_SIGNING_KEY

          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: auth-db-secret
                key: DB_NAME

          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: auth-db-secret
                key: DB_USER

          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: auth-db-secret
                key: DB_PASSWORD

          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                name: auth-db-secret
                key: DB_HOST

          - name: DB_PORT
            valueFrom:
              secretKeyRef:
                name: auth-db-secret
                key: DB_PORT