apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      tolerations:
        - operator: "Exists"
      containers:
        - name: auth-service
          image: 851759420144.dkr.ecr.us-east-2.amazonaws.com/auth-service:07903f24e7764c0a35594b665b01833ad55c364c
          ports:
            - containerPort: 8000
          env:

          - name: USER_SERVICE_URL
            value: http://user-service:8002
          - name: JWT_SIGNING_KEY
            valueFrom:
              secretKeyRef:
                name: auth-secret
                key: JWT_SIGNING_KEY

          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: auth-db-secret
                key: DB_NAME

          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: auth-db-secret
                key: DB_USER

          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: auth-db-secret
                key: DB_PASSWORD

          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                name: auth-db-secret
                key: DB_HOST

          - name: DB_PORT
            valueFrom:
              secretKeyRef:
                name: auth-db-secret
                key: DB_PORT